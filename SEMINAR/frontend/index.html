<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Dự báo thời tiết</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background-color: black;
            text-align: center;
            text-shadow: 2px 2px 5px black;
            -webkit-text-stroke: 0.1px black;
            color: white;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px;
            font-size: 16px;
            background: #ffcc00;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .weather-info {
            margin-top: 20px;
        }
        img {
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>
    <video autoplay loop muted>
        <source src="./assets/background.mp4" type="video/mp4">
    </video>
    
    <div class="content">
        <h1>SkyCast</h1>
        <p>Dự báo thời tiết TP.HCM theo thời gian thực</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Nhập quận/huyện...">
            <button onclick="fetchWeather()">
                <i class="fas fa-search"></i>
            </button>
            
        </div>
        
        <div class="weather-info">
            <h2 id="location">--</h2>
            <img id="weatherIcon" src="assets/default-weather.png" alt="Weather Icon">
            <p>Nhiệt độ: <span id="temperature">--</span>°C</p>
            <p>Độ ẩm: <span id="humidity">--</span>%</p>
            <p>Gió: <span id="windSpeed">--</span> km/h</p>
            <p id="status">Đang cập nhật...</p>
        </div>
    </div>
    
    <script src="./assets/script.js"></script>

</body>
</html>
